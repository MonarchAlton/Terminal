name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Windows quality checks
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm tool versions
        shell: cmd
        run: |
          cmake --version
          ninja --version
          clang-cl --version
          clang-format --version
          clang-tidy --version
          rustc --version
          cargo --version

      - name: Install Doxygen
        shell: powershell
        run: choco install doxygen.install -y

      - name: Check C++ formatting
        shell: cmd
        run: |
          if not exist scripts\format.bat (
            echo Missing scripts\format.bat
            dir scripts
            exit /b 1
          )
          call scripts\format.bat

      - name: Rust formatting
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo fmt --all --check
          ) else (
            echo Skipping Rust formatting: no Cargo.toml found.
          )

      - name: Rust clippy
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo clippy --all-targets --all-features -- -D warnings
          ) else (
            echo Skipping Rust clippy: no Cargo.toml found.
          )

      - name: Rust tests
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo test --all-targets --all-features
          ) else (
            echo Skipping Rust tests: no Cargo.toml found.
          )

      - name: Install cargo-audit
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo install cargo-audit --locked
          ) else (
            echo Skipping cargo-audit install: no Cargo.toml found.
          )

      - name: Rust dependency audit
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo audit
          ) else (
            echo Skipping cargo audit: no Cargo.toml found.
          )

      - name: Configure CMake
        shell: cmd
        run: cmake --preset windows-clang-debug

      - name: Build C++
        shell: cmd
        run: cmake --build --preset build-windows-clang-debug

      - name: Configure CMake AddressSanitizer
        shell: cmd
        run: cmake --preset windows-clang-asan

      - name: Build C++ AddressSanitizer
        shell: cmd
        run: cmake --build --preset build-windows-clang-asan

      - name: Generate Doxygen documentation
        shell: cmd
        run: call scripts\docs.bat

      - name: Fuzzing scaffold check
        shell: cmd
        run: |
          call scripts\fuzz-cpp.bat
          call scripts\fuzz-rust.bat