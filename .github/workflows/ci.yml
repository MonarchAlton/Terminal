name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Windows quality checks
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm tool versions
        shell: cmd
        run: |
          cmake --version
          ninja --version
          clang-cl --version
          clang-format --version
          clang-tidy --version
          rustc --version
          cargo --version

      - name: Check C++ formatting
        shell: cmd
        run: call .\scripts\check-format.bat

      - name: Rust formatting
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo fmt --all --check
          ) else (
            echo Skipping Rust formatting: no Cargo.toml found.
          )

      - name: Rust clippy
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo clippy --all-targets --all-features -- -D warnings
          ) else (
            echo Skipping Rust clippy: no Cargo.toml found.
          )

      - name: Rust tests
        shell: cmd
        run: |
          if exist Cargo.toml (
            cargo test --all-targets --all-features
          ) else (
            echo Skipping Rust tests: no Cargo.toml found.
          )

      - name: Configure CMake
        shell: cmd
        run: cmake --preset windows-clang-debug

      - name: Build C++
        shell: cmd
        run: cmake --build --preset build-windows-clang-debug